<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker by Noman</title>
    <link rel="shortcut icon" href="./images/logo_favicon.webp" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 class="mainHeading">Welcome to Task Tracker</h1>

    <!-- ticker section -->
    <div class="ticker">
        <div class="tickerContent">
            <span class="tick">Think Of It 🔴</span>
            <span class="tick">Plan It 🟡</span>
            <span class="tick">Track it Here ✅</span>
            <span class="tick">Do it 🟢</span>

            <!-- duplicate for loop -->
            <span class="tick">Think Of It 🔴</span>
            <span class="tick">Plan It 🟡</span>
            <span class="tick">Track it Here ✅</span>
            <span class="tick">Do it 🟢</span>
        </div>
    </div>

    <form action="" id="input_form">
        <label for="input_text_box" id="input_label" >Enter a new Task</label>
            <input type="text"
                id="input_text_box"
                placeholder="You can Do It"
                name="task"
                required  
                autocomplete="off"
            />
        <button type="submit" id="add_button">Add</button> 
    </form>


    <div class="pendingBox">

        <h2 class="pendingHeading">Pending Tasks</h2>
        
         <!-- inject from js -->
        <ol class="pendingList">

            <p class="emptyMessage">No Task Yet! <br/> Add a new Task.</p>

        </ol>
    </div>


    <div class="completedBox">
        <h2 class="compltedHeading">Completed Tasks</h2>

        <ol class="completedList">
            <!-- li inject by javascript -->
            <p class="emptyMessage">Keep Trying <br/> You Can Do It!</p>
        </ol>
    </div>
    

    <footer id="devFooter">
        <h2 id="intro">Website Developed by  NOMAN ALI ANSARI</h2>

        <div class="devSocial">
            <!-- not img  but svg -->
            <a href="https://www.linkedin.com/in/noman-ali-ansari-72ab2b323/" id="linkIcon"> 

                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="linkedIn" viewBox="0 0 16 16">
                    <path d="M0 1.146C0 .513.526 0 1.175 0h13.65C15.474 0 16 .513 16 1.146v13.708c0 .633-.526 1.146-1.175 1.146H1.175C.526 16 0 15.487 0 14.854zm4.943 12.248V6.169H2.542v7.225zm-1.2-8.212c.837 0 1.358-.554 1.358-1.248-.015-.709-.52-1.248-1.342-1.248S2.4 3.226 2.4 3.934c0 .694.521 1.248 1.327 1.248zm4.908 8.212V9.359c0-.216.016-.432.08-.586.173-.431.568-.878 1.232-.878.869 0 1.216.662 1.216 1.634v3.865h2.401V9.25c0-2.22-1.184-3.252-2.764-3.252-1.274 0-1.845.7-2.165 1.193v.025h-.016l.016-.025V6.169h-2.4c.03.678 0 7.225 0 7.225z"/>
                </svg>
                <span id="iconName">LinkedIn</span>
            </a>

        </div>


    </footer>


    <!-- Learning From This Project-->



    <script src="script.js"></script>    
</body>
</html>
